plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.n8n.notifications'
    compileSdk 34

    defaultConfig {
        applicationId "com.n8n.notifications"
        minSdk 33
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.12.0'
}
